name: "Build and Push Gadget"
description: "Build and push an Inspektor Gadget gadget OCI image using ig"
branding:
  icon: "package"
  color: "purple"

inputs:
  gadget:
    description: "Path to the gadget source directory"
    required: true
  image:
    description: "Full image reference for the gadget (e.g. ghcr.io/myorg/mygadget:latest)"
    required: true
  builder-image:
    description: "Builder image to use for compiling the gadget"
    required: false
    default: "ghcr.io/inspektor-gadget/gadget-builder:latest"
  build-args:
    description: "Additional arguments to pass to ig image build"
    required: false
    default: ""
  push:
    description: "Whether to push the image after building"
    required: false
    default: "true"
  cosign-private-key:
    description: "Cosign private key for signing the gadget image after push"
    required: false
    default: ""
  cosign-password:
    description: "Password for the cosign private key"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Pull builder image
      shell: bash
      run: docker pull "${{ inputs.builder-image }}"

    - name: Build gadget
      shell: bash
      run: |
        sudo ig image build \
          --builder-image "${{ inputs.builder-image }}" \
          --builder-image-pull=never \
          -t "${{ inputs.image }}" \
          ${{ inputs.build-args }} \
          "${{ inputs.gadget }}"

    - name: Push gadget
      if: inputs.push == 'true'
      shell: bash
      run: sudo -E ig image push "${{ inputs.image }}"

    - name: Sign gadget with cosign
      if: inputs.push == 'true' && inputs.cosign-private-key != ''
      shell: bash
      env:
        COSIGN_PASSWORD: ${{ inputs.cosign-password }}
        COSIGN_PRIVATE_KEY: ${{ inputs.cosign-private-key }}
      run: |
        # Force legacy .sig format as ig expects it for signature verification.
        cosign sign --new-bundle-format=false --use-signing-config=false --key env://COSIGN_PRIVATE_KEY --yes --recursive "${{ inputs.image }}"
