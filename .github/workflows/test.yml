name: Test Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-gadget:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: mqasimsarfraz/setup-ig@main

      - uses: ./
        with:
          gadget: example/
          image: ghcr.io/${{ github.repository }}/hello-world:${{ github.sha }}
